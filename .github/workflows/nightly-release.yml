name: Nightly Build

on:
  schedule:
    - cron: "0 23 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  PLUGIN_WASM: target/wasm32-wasip2/release/world_pumpkin.wasm
  ASSET_NAME: world_pumpkin-nightly.wasm

permissions:
  contents: write

concurrency:
  group: nightly-build
  cancel-in-progress: true

jobs:
  build:
    name: Build Nightly Prerelease
    runs-on: ubuntu-latest

    steps:
      - name: Checkout WorldPumpkin
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check if nightly needs update
        id: nightly
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          LATEST_NIGHTLY_TAG="$(gh release list \
            --limit 100 \
            --json isPrerelease,tagName,createdAt \
            --jq '[.[] | select(.isPrerelease and (.tagName | startswith("nightly-")))] | sort_by(.createdAt) | reverse | .[0].tagName // ""')"

          if [ -n "$LATEST_NIGHTLY_TAG" ]; then
            git fetch origin "refs/tags/$LATEST_NIGHTLY_TAG:refs/tags/$LATEST_NIGHTLY_TAG" || true
          fi

          if [ -n "$LATEST_NIGHTLY_TAG" ] && git rev-parse "$LATEST_NIGHTLY_TAG^{commit}" >/dev/null 2>&1; then
            NIGHTLY_SHA="$(git rev-parse "$LATEST_NIGHTLY_TAG^{commit}")"

            echo "Latest nightly tag: $LATEST_NIGHTLY_TAG"
            echo "Nightly SHA: $NIGHTLY_SHA"
            echo "Current SHA: $GITHUB_SHA"

            if [ "$NIGHTLY_SHA" = "$GITHUB_SHA" ]; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            if git diff --quiet "$NIGHTLY_SHA..$GITHUB_SHA" -- Cargo.toml Cargo.lock src; then
              echo "No Wasm inputs changed since last nightly"
              echo "changed=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        if: steps.nightly.outputs.changed == 'true'
        run: |
          rustup toolchain install nightly --profile minimal --target wasm32-wasip2 --component rustfmt --component clippy
          rustup default nightly

      - name: Cache Cargo
        if: steps.nightly.outputs.changed == 'true'
        uses: Swatinem/rust-cache@v2.9.1

      - name: Check formatting
        if: steps.nightly.outputs.changed == 'true'
        run: cargo fmt --all --check

      - name: Lint
        if: steps.nightly.outputs.changed == 'true'
        run: cargo clippy --locked --target wasm32-wasip2 --all-targets -- -D warnings

      - name: Check Wasm build
        if: steps.nightly.outputs.changed == 'true'
        run: cargo check --locked --target wasm32-wasip2

      - name: Build release Wasm
        if: steps.nightly.outputs.changed == 'true'
        run: cargo build --locked --release --target wasm32-wasip2

      - name: Create release bundle
        if: steps.nightly.outputs.changed == 'true'
        run: |
          test -f "$PLUGIN_WASM"
          mkdir -p dist
          cp "$PLUGIN_WASM" "dist/$ASSET_NAME"

      - name: Delete old nightly releases and tags
        if: steps.nightly.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          OLD_TAGS="$(gh release list \
            --limit 100 \
            --json tagName,isPrerelease \
            --jq '.[] | select(.isPrerelease and (.tagName | startswith("nightly-"))) | .tagName')"

          for TAG in $OLD_TAGS; do
            echo "Deleting old nightly release and tag: $TAG"
            gh release delete "$TAG" --yes --cleanup-tag || true
          done

      - name: Create nightly tag
        id: nightly_tag
        if: steps.nightly.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          NIGHTLY_TAG="nightly-$(date -u +%Y%m%d)"
          echo "tag=$NIGHTLY_TAG" >> "$GITHUB_OUTPUT"

          git tag "$NIGHTLY_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$NIGHTLY_TAG"

      - name: Publish nightly prerelease
        if: steps.nightly.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          GENERATED_ON="$(date -u '+%Y-%m-%d %H:%M UTC')"
          NOTES="Generated on: $GENERATED_ON"$'\n'"Commit: $GITHUB_SHA"

          gh release create "${{ steps.nightly_tag.outputs.tag }}" \
            --title "Nightly Build" \
            --notes "$NOTES" \
            --prerelease \
            --latest=false \
            "dist/$ASSET_NAME"
