name: Nightly Build

on:
  schedule:
    # 00:00 CET = 23:00 UTC
    - cron: "0 23 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  PLUGIN_WASM: target/wasm32-wasip2/release/world_pumpkin.wasm
  NIGHTLY_TAG: nightly
  ASSET_NAME: world_pumpkin-nightly.wasm

permissions:
  contents: write

jobs:
  build:
    name: Build Nightly Prerelease
    runs-on: ubuntu-latest

    steps:
      - name: Checkout WorldPumpkin
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check if nightly needs update
        id: nightly
        run: |
          if git rev-parse "$NIGHTLY_TAG" >/dev/null 2>&1; then
            TAG_SHA=$(git rev-parse "$NIGHTLY_TAG")
            echo "Tag SHA: $TAG_SHA"
            echo "Current SHA: $GITHUB_SHA"

            if [ "$TAG_SHA" = "$GITHUB_SHA" ]; then
              echo "changed=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Install Rust toolchain
        if: steps.nightly.outputs.changed == 'true'
        run: |
          rustup toolchain install nightly --profile minimal --target wasm32-wasip2 --component rustfmt --component clippy
          rustup default nightly

      - name: Cache Cargo
        if: steps.nightly.outputs.changed == 'true'
        uses: Swatinem/rust-cache@v2.9.1

      - name: Check formatting
        if: steps.nightly.outputs.changed == 'true'
        run: cargo fmt --all --check

      - name: Lint
        if: steps.nightly.outputs.changed == 'true'
        run: cargo clippy --locked --target wasm32-wasip2 --all-targets -- -D warnings

      - name: Check Wasm build
        if: steps.nightly.outputs.changed == 'true'
        run: cargo check --locked --target wasm32-wasip2

      - name: Build release Wasm
        if: steps.nightly.outputs.changed == 'true'
        run: cargo build --locked --release --target wasm32-wasip2

      - name: Create release bundle
        if: steps.nightly.outputs.changed == 'true'
        run: |
          mkdir -p dist
          cp "$PLUGIN_WASM" "dist/$ASSET_NAME"

      - name: Update nightly tag
        if: steps.nightly.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -f "$NIGHTLY_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$NIGHTLY_TAG" --force

      - name: Publish or update nightly prerelease
        if: steps.nightly.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          GENERATED_ON="$(date -u '+%Y-%m-%d %H:%M UTC')"
          NOTES="Generated on: $GENERATED_ON"

          if gh release view "$NIGHTLY_TAG" >/dev/null 2>&1; then
            gh release edit "$NIGHTLY_TAG" \
              --title "Nightly Build" \
              --notes "$NOTES" \
              --prerelease \
              --latest=false

            gh release delete-asset "$NIGHTLY_TAG" "$ASSET_NAME" -y || true

            gh release upload "$NIGHTLY_TAG" \
              "dist/$ASSET_NAME" \
              --clobber
          else
            gh release create "$NIGHTLY_TAG" \
              --title "Nightly Build" \
              --notes "$NOTES" \
              --prerelease \
              --latest=false \
              "dist/$ASSET_NAME"
          fi
