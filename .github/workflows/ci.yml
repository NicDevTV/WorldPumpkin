name: CI

on:
  push:
    branches:
      - main
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest

    steps:
      - name: Checkout WorldPumpkin
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        run: |
          rustup toolchain install nightly --profile minimal --target wasm32-wasip2 --component rustfmt
          rustup default nightly

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2.9.1

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check Wasm build
        run: cargo check --locked --target wasm32-wasip2

      - name: Build release Wasm
        run: cargo build --locked --release --target wasm32-wasip2

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v7
        with:
          name: world-pumpkin-wasm
          path: target/wasm32-wasip2/release/world_pumpkin.wasm
          if-no-files-found: error
